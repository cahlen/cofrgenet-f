# Pair 1: 410M CoFrGeNet-F — sanity check at small scale
# Same data/schedule as baseline, only FFN differs
n_layer: 12
n_embd: 2048
n_head: 16
num_ladders: 3
cf_depth: 5
block_size: 1024
total_steps: 95367    # 50B tokens / 524288 batch_tokens
warmup_steps: 700
lr: 6.0e-4
weight_decay: 0.1
batch_tokens: 524288
micro_batch_size: 64  # B200 has 179GB VRAM — 16 was wasting 95% of memory
compile: true         # ~1.5-2x throughput boost
checkpoint_dir: checkpoints/pair1-cofrgenet-410m
save_interval: 5000
eval_interval: 1000
trackio_group: pair1-450m
